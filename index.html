<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>García Mobiliario</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

:root{
--negro:#1a1a1a;
--gris:#444;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

/* FONDO MADERA */

body{

background-color:#8b5a2b;

background-image:
repeating-linear-gradient(
90deg,
rgba(60,35,20,0.35) 0px,
rgba(60,35,20,0.35) 2px,
transparent 2px,
transparent 8px
),

repeating-linear-gradient(
90deg,
rgba(0,0,0,0.15) 0px,
rgba(0,0,0,0.15) 1px,
transparent 1px,
transparent 4px
),

linear-gradient(
90deg,
#6e4527,
#8b5a2b,
#7a4a2a,
#8b5a2b
);

min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;

}

/* CONTENEDOR */

.container{
max-width:600px;
width:100%;
display:flex;
flex-direction:column;
gap:25px;
}

/* TARJETAS */

.card{

background:white;

border-radius:16px;

padding:30px;

box-shadow:
0 25px 60px rgba(0,0,0,0.35),
0 8px 20px rgba(0,0,0,0.2);

animation:entrada .8s ease;

}

/* Animación */

@keyframes entrada{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{
height:150px;
display:block;
margin:auto;
mix-blend-mode:multiply;
}

/* TITULOS */

.title{
font-family:'Playfair Display',serif;
text-align:center;
font-size:2rem;
color:var(--negro);
margin-top:10px;
}

.subtitle{
text-align:center;
font-size:.95rem;
color:var(--gris);
margin-top:5px;
}

/* BOTONES */

.social{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{

padding:14px;

text-align:center;

border-radius:8px;

text-decoration:none;

font-weight:700;

border:2px solid var(--negro);

color:var(--negro);

transition:.25s;

}

.btn:hover{
background:var(--negro);
color:white;
}

/* VIDEO */

.video-container{

margin-top:15px;

border-radius:14px;

overflow:hidden;

aspect-ratio:9/16;

}

.video-container iframe{

width:100%;
height:100%;
border:none;

}

/* HORARIO */

.schedule-title{

font-weight:700;

margin-bottom:15px;

border-bottom:2px solid #8b5a2b;

display:inline-block;

padding-bottom:5px;

}

.schedule{

display:flex;
justify-content:space-between;

font-weight:600;

margin-bottom:8px;

}

/* ===================== */
/* CARRUSEL PROFESIONAL */
/* ===================== */

.carousel{

position:relative;
margin-top:15px;
border-radius:14px;
overflow:hidden;

}

.carousel-track{

display:flex;
transition:transform .6s ease;

}

.slide{

min-width:100%;

display:flex;
justify-content:center;
align-items:center;

}

.slide img{

width:100%;
height:auto;
max-height:520px;
object-fit:contain;

}

/* BOTONES */

.carousel-btn{

position:absolute;
top:50%;
transform:translateY(-50%);

background:rgba(0,0,0,0.5);
color:white;

border:none;

font-size:22px;

width:40px;
height:40px;

border-radius:50%;
cursor:pointer;

}

.carousel-btn:hover{
background:black;
}

.left{left:10px;}
.right{right:10px;}

/* INDICADORES */

.dots{

display:flex;
justify-content:center;
gap:8px;
margin-top:12px;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#bbb;
cursor:pointer;

transition:.3s;

}

.dot.active{
background:#1a1a1a;
transform:scale(1.2);
}

/* FOOTER */

footer{

margin-top:25px;
color:white;
text-align:center;
font-size:.85rem;

}

</style>

</head>

<body>

<div class="container">

<!-- LOGO -->

<div class="card">

<img src="https://cdn.phototourl.com/uploads/2026-03-10-7146cae6-6dc2-4bbd-bf1e-3954c5efb35e.jpg" class="logo">

<h1 class="title">GARCÍA MOBILIARIO</h1>

<p class="subtitle">Arte en cada corte, pasión en cada proyecto</p>

</div>

<!-- REDES -->

<div class="card">

<h3 class="schedule-title">Nuestros Canales</h3>

<div class="social">

<a class="btn"
href="https://api.whatsapp.com/send?phone=573193384549"
target="_blank">Cotizar por WhatsApp</a>

<a class="btn"
href="https://www.instagram.com/garciamobiliario__"
target="_blank">Instagram</a>

<a class="btn"
href="https://www.facebook.com/share/1GiYH96ikN/"
target="_blank">Facebook</a>

<a class="btn"
href="https://www.tiktok.com/@garciamobiliario"
target="_blank">TikTok</a>

</div>

</div>

<!-- VIDEO -->

<div class="card">

<h3 class="schedule-title">Nuestro Trabajo</h3>

<div class="video-container">

<iframe src="https://www.instagram.com/reel/DBZFUR4RPc-/embed"></iframe>

</div>

</div>

<!-- HORARIO -->

<div class="card">

<h3 class="schedule-title">Horario de Atención</h3>

<div class="schedule">
<span>Lunes a Viernes</span>
<span>8 AM - 6 PM</span>
</div>

<div class="schedule">
<span>Sábados</span>
<span>8 AM - 1 PM</span>
</div>

</div>

<!-- CARRUSEL MEJORADO -->

<div class="card">

<h3 class="schedule-title">Nuestros Proyectos</h3>

<div class="carousel">

<div class="carousel-track" id="track">

<div class="slide">
<img src="https://cdn.phototourl.com/uploads/2026-03-11-b7089b5e-68b7-4efa-a373-96fd91cba484.jpg">
</div>

<div class="slide">
<img src="https://i.ibb.co/93vdN7fv/Gemini-Generated-Image-v0s7xcv0s7xcv0s7.png">
</div>

<div class="slide">
<img src="https://i.ibb.co/Qj8GGKK0/Gemini-Generated-Image-rbr3s4rbr3s4rbr3.png">
</div>

</div>

<button class="carousel-btn left" onclick="prevSlide()">❮</button>
<button class="carousel-btn right" onclick="nextSlide()">❯</button>

</div>

<div class="dots" id="dots"></div>

</div>

</div>

<footer>

<p>Barrio Villabel — Floridablanca</p>
<p>© <span id="year"></span> García Mobiliario</p>

</footer>

<script>

/* AÑO */

document.getElementById("year").textContent = new Date().getFullYear();

/* CARRUSEL */

const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");

let index = 0;

function updateCarousel(){

track.style.transform = `translateX(-${index * 100}%)`;

document.querySelectorAll(".dot").forEach(dot=>dot.classList.remove("active"));
document.querySelectorAll(".dot")[index].classList.add("active");

}

function nextSlide(){

index++;
if(index >= slides.length) index = 0;

updateCarousel();

}

function prevSlide(){

index--;
if(index < 0) index = slides.length-1;

updateCarousel();

}

/* DOTS */

const dotsContainer = document.getElementById("dots");

slides.forEach((_,i)=>{

const dot = document.createElement("div");
dot.classList.add("dot");

if(i===0) dot.classList.add("active");

dot.addEventListener("click",()=>{
index=i;
updateCarousel();
});

dotsContainer.appendChild(dot);

});

/* AUTOPLAY */

setInterval(nextSlide,4500);

/* SWIPE PARA CELULAR */

let startX = 0;

track.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX;
});

track.addEventListener("touchend",e=>{

let endX = e.changedTouches[0].clientX;

if(startX - endX > 50){
nextSlide();
}

if(endX - startX > 50){
prevSlide();
}

});

</script>

</body>
</html>
